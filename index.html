<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Dashboard</title>

<style>
body {font-family:Segoe UI; background:#f0f4f8; padding:20px;}
.container {max-width:1400px;margin:auto;display:flex;flex-direction:column;gap:20px;}

.card {background:#1f3c88;color:white;padding:20px;border-radius:12px;}
button {padding:8px 12px;border:none;border-radius:6px;cursor:pointer;}

.progress-bar {height:10px;background:#ccc;border-radius:6px;overflow:hidden;}
.progress-fill {height:100%;background:#27ae60;}

.exam-card {padding:15px;border-radius:10px;margin-bottom:10px;color:white;}
.urgent {background:#e74c3c;}
.soon {background:#f39c12;}
.chill {background:#2ecc71;}
.mock-card {background:#2980b9;border:2px dashed white;}

#miniCalendar {display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
#miniCalendar div {padding:8px;text-align:center;border-radius:4px;background:#ddd;}
.board-day {background:#f39c12 !important;color:black;}
.mock-day {background:#3498db !important;color:white;}
.today {background:#27ae60 !important;color:white;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>📊 Dashboard</h2>
<p id="nextExam"></p>
<p id="streak"></p>
<p id="papersSolved"></p>
</div>

<div class="card">
<select id="subjectCode">
<option value="9702">Physics</option>
<option value="9701">Chemistry</option>
<option value="9618">CS</option>
<option value="9709">Math</option>
<option value="8021">EGP</option>
</select>

<input id="component" placeholder="Component">

<select id="session">
<option value="m">M</option>
<option value="s">S</option>
<option value="w">W</option>
</select>

<select id="year"></select>

<button onclick="openPastPaper()">Open</button>
<button onclick="searchYoutube()">YouTube</button>
<button onclick="markSolved()">Solved</button>
</div>

<div class="card">
<h2>📈 Progress</h2>
<div id="progress"></div>
</div>

<div class="card">
<h2>🤖 Recommended Papers</h2>
<div id="recommend"></div>
</div>

<div class="card">
<h2>📅 Exams</h2>
<div id="examTracker"></div>
</div>

<div class="card">
<h2>📅 Calendar</h2>
<div id="miniCalendar"></div>
</div>

</div>

<script>

// YEARS
const yearSelect=document.getElementById('year');
for(let y=2026;y>=2000;y--){
let opt=document.createElement('option');
opt.value=y.toString().slice(-2);
opt.textContent=y;
yearSelect.appendChild(opt);
}

// ================= EXAMS =================
const exams=[

/* MOCK EXAMS */
{subject:'Physics',component:'P4 & P5',date:'2026-03-19',type:'mock'},
{subject:'EGP',component:'P1 & P2',date:'2026-03-23',type:'mock'},
{subject:'Chemistry',component:'P4 & P5',date:'2026-03-26',type:'mock'},
{subject:'Computer Science',component:'P4',date:'2026-03-27',type:'mock'},
{subject:'Computer Science',component:'P3',date:'2026-03-29',type:'mock'},
{subject:'Mathematics',component:'P3 & P4',date:'2026-03-31',type:'mock'},

/* BOARD EXAMS */
{subject:'EGP',component:'P1',date:'2026-04-27',type:'boards'},
{subject:'EGP',component:'P2',date:'2026-05-04',type:'boards'},
{subject:'Mathematics',component:'P4',date:'2026-05-06',type:'boards'},
{subject:'Chemistry',component:'P4',date:'2026-05-06',type:'boards'},
{subject:'Physics',component:'P4',date:'2026-05-11',type:'boards'},
{subject:'Mathematics',component:'P3',date:'2026-05-15',type:'boards'},
{subject:'Chemistry',component:'P5',date:'2026-05-18',type:'boards'},
{subject:'Computer Science',component:'P3',date:'2026-05-19',type:'boards'},
{subject:'Physics',component:'P5',date:'2026-05-20',type:'boards'},
{subject:'Computer Science',component:'P4',date:'2026-05-21',type:'boards'}
];

// STORAGE
let solved=JSON.parse(localStorage.getItem("solved")||"[]");

// DASHBOARD
function updateDashboard(){
const today=new Date();

let future=exams.filter(e=>new Date(e.date)>=today);
future.sort((a,b)=>new Date(a.date)-new Date(b.date));
let next=future[0];
let days=Math.ceil((new Date(next.date)-today)/86400000);
nextExam.textContent=`Next: ${next.subject} (${next.type}) in ${days} days`;

let streak=0;
let d=new Date();
while(true){
let ds=d.toISOString().split("T")[0];
if(solved.some(x=>x.date===ds)){streak++;d.setDate(d.getDate()-1);}
else break;
}
document.getElementById("streak").textContent=`🔥 Streak: ${streak}`;

let todayStr=today.toISOString().split("T")[0];
let count=solved.filter(x=>x.date===todayStr).length;
papersSolved.textContent=`Solved today: ${count}`;
}
updateDashboard();

// EXAMS UI
function renderExams(){
let today=new Date();
examTracker.innerHTML=exams.map(e=>{
let diff=Math.ceil((new Date(e.date)-today)/86400000);

if(e.type==="mock"){
return `<div class="exam-card mock-card">${e.subject} ${e.component}<br>Mock<br>${diff} days</div>`;
}

let cls=diff<=3?'urgent':diff<=7?'soon':'chill';
return `<div class="exam-card ${cls}">${e.subject} ${e.component}<br>Board<br>${diff} days</div>`;
}).join('');
}
renderExams();

// CALENDAR
function renderCalendar(){
let d=new Date();
let month=d.getMonth();
let year=d.getFullYear();
let days=new Date(year,month+1,0).getDate();

for(let i=1;i<=days;i++){
let div=document.createElement('div');
let date=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
div.textContent=i;

let exam=exams.find(e=>e.date===date);
if(exam){
if(exam.type==="mock") div.classList.add('mock-day');
else div.classList.add('board-day');
}

if(i===d.getDate()) div.classList.add('today');

miniCalendar.appendChild(div);
}
}
renderCalendar();

</script>
</body>
</html>
